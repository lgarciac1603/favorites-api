version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: favorites-postgres
    environment:
      POSTGRES_DB: apidb
      POSTGRES_USER: apiuser_test
      POSTGRES_PASSWORD: apipass_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiuser_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - favorites-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: favorites-api
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: apidb
      DB_USER: apiuser_test
      DB_PASS: apipass_test
      APP_PORT: "8090"
      CORS_ALLOW_ORIGIN: "*"
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - favorites-network

volumes:
  postgres_data:

networks:
  favorites-network:
    driver: bridge
